<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word导出测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .test-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background: #45a049;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .info {
            background: #e7f3fe;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <h1>Word文档导出测试</h1>
    
    <div class="test-section">
        <h2>测试说明</h2>
        <p>点击下方按钮测试Word文档生成功能。系统将使用预设的测试数据生成一份发电行业温室气体排放核算报告。</p>
    </div>
    
    <button id="testBtn">生成测试Word文档</button>
    
    <div id="result"></div>
    
    <!-- 加载必要的库 -->
    <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js" onerror="console.error('docx库加载失败(unpkg)')"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js" onerror="console.error('FileSaver库加载失败(unpkg)')"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js" onerror="console.error('FileSaver库加载失败(jsdelivr)')"></script>
    <script src="js/report/report-generator.js"></script>
    
    <script>
        // 页面加载时检查库状态
        window.addEventListener('load', function() {
            console.log('页面加载完成，检查库状态...');
            console.log('docx:', typeof docx !== 'undefined' ? '已加载' : '未加载');
            console.log('saveAs:', typeof saveAs !== 'undefined' ? '已加载' : '未加载');
            console.log('ReportGenerator:', typeof ReportGenerator !== 'undefined' ? '已加载' : '未加载');
        });
        
        document.getElementById('testBtn').addEventListener('click', async function() {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'info';
            resultDiv.textContent = '正在生成报告...';
            
            try {
                // 检查docx库是否加载
                console.log('检查docx库...');
                if (typeof docx === 'undefined') {
                    throw new Error('docx库未加载，请检查网络连接');
                }
                console.log('docx库已加载，版本信息:', Object.keys(docx).slice(0, 10));
                
                // 检查ReportGenerator是否定义
                console.log('检查ReportGenerator...');
                if (typeof ReportGenerator === 'undefined') {
                    throw new Error('ReportGenerator类未定义');
                }
                console.log('ReportGenerator类已定义');
                
                // 创建测试数据
                console.log('创建测试数据...');
                const testData = {
                    '企业全称': '测试发电有限公司',
                    '企业名称': '测试发电有限公司',
                    '信用代码': '91110000MA1234567X',
                    '法人': '张三',
                    '注册地址': '北京市朝阳区测试路1号',
                    '生产地址': '北京市朝阳区测试路1号',
                    '联系人': '李四',
                    '电话': '010-12345678',
                    '邮箱': 'test@example.com',
                    '核算年度': '2025',
                    '细分品类': '火力发电',
                    '核算边界说明': '厂区内所有生产设施及辅助系统',
                    '编制单位': '测试发电有限公司',
                    '编制日期': '2026年03月02日',
                    '发电量': '50',
                    '发电量单位': '亿kWh',
                    '装机容量': '600',
                    '机组数量': '2',
                    '煤炭消耗量': '1500000',
                    '天然气消耗量': '500',
                    '柴油消耗量': '100',
                    '低位发热量': '24.5',
                    '石灰石用量': '50000',
                    '外购电力用量': '200',
                    '外购热力用量': '1000',
                    '范围1总量': '2,850,000',
                    '范围1占比': '95%',
                    '范围2总量': '150,000',
                    '范围2占比': '5%',
                    '燃烧排放量': '2,700,000',
                    '脱硫排放量': '150,000',
                    '电力排放量': '140,000',
                    '热力排放量': '10,000',
                    '总排放量': '3,000,000'
                };
                
                // 生成报告
                console.log('开始生成报告...');
                const generator = new ReportGenerator();
                console.log('ReportGenerator实例已创建');
                
                const blob = await generator.generate('power', testData);
                console.log('报告已生成，blob:', blob);
                
                // 检查blob
                if (!blob || !(blob instanceof Blob)) {
                    throw new Error('报告生成失败：无效的Blob对象');
                }
                
                // 下载报告
                const filename = '2025年度发电行业温室气体排放核算报告.docx';
                saveAs(blob, filename);
                
                resultDiv.className = 'success';
                resultDiv.innerHTML = `
                    <strong>✓ 测试成功！</strong><br>
                    文件大小: ${(blob.size / 1024).toFixed(2)} KB<br>
                    文件名: ${filename}<br>
                    文档已开始下载，请检查下载的Word文档。
                `;
                
            } catch (error) {
                console.error('测试失败:', error);
                const errorMsg = error && error.message ? error.message : String(error);
                const errorStack = error && error.stack ? error.stack : '无堆栈信息';
                resultDiv.className = 'error';
                resultDiv.innerHTML = `
                    <strong>✗ 测试失败</strong><br>
                    错误信息: ${errorMsg}<br>
                    错误堆栈: <pre style="white-space: pre-wrap; font-size: 12px;">${errorStack}</pre>
                    <br>
                    请检查浏览器控制台获取详细错误信息。
                `;
            }
        });
    </script>
</body>
</html>
